name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio
        pip install fastapi uvicorn httpx python-dotenv sqlalchemy psycopg2-binary pydantic-settings
        # Lightweight runtime deps reached by `from main import app` (queue + adapter-storage
        # import chains) and the embeddings test — enough to assert the OpenAI-compatible
        # chat/embeddings contracts against the MOCK backend, without the heavy ML/GPU stack.
        pip install numpy redis rq boto3
        pip install git+https://github.com/alexberardi/jarvis-settings-client.git@main

    - name: Run tests
      env:
        DATABASE_URL: "sqlite:///test.db"
        # Placeholder so module-level get_auth_url() in settings_routes/pipeline_routes
        # resolves at import (full-app tests reload `main`). Auth is mocked in tests, so
        # this URL is never actually called.
        JARVIS_AUTH_BASE_URL: "http://localhost:7701"
      run: |
        pytest -v --tb=short \
          --ignore=tests/manual \
          --ignore=tests/test_adapter_cache.py \
          --ignore=tests/test_adapter_storage.py \
          --ignore=tests/test_vllm_dynamic_adapter.py \
          --ignore=tests/test_mlx_adapter_swap.py \
          --ignore=tests/test_mlx_prompt.py \
          --ignore=tests/test_settings_routes.py \
          --ignore=tests/test_embedding_manager.py

    - name: Run date key matcher tests
      run: |
        pytest tests/test_date_key_matcher.py -v --tb=short
